## VARIABLES
$terminal = kitty
$browser = zen
$fileManager = thunar
$search = wofi --show drun
$cliphist = cliphist list | wofi -S dmenu | cliphist decode | wl-copy

# GLOBAL KEYBINDS
## essentials
bind = SUPER, Q, killactive
bind = SUPER, R, exec, hyprctl reload
bind = SUPER, Return, exec, $terminal

## motions
binde = SUPER, H, layoutmsg, focus left
binde = SUPER, J, layoutmsg, focus down
binde = SUPER, K, layoutmsg, focus up
binde = SUPER, L, layoutmsg, focus right

bind = SUPER ALT, H, movefocus, l
bind = SUPER ALT, J, movefocus, d
bind = SUPER ALT, K, movefocus, u
bind = SUPER ALT, L, movefocus, r

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

bind = SUPER, Tab, cyclenext, visible

## workspace
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

## scratchpads
bind = SUPER, S, togglespecialworkspace, nothing
bind = SUPER SHIFT, S, movetoworkspace, special:nothing

## mouse binds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

## xf86 stuff
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+; ags request "osd volume 1000";
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-; ags request "osd volume 1000";
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; ags request "osd volume 1000";
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl pause; playerctl stop;
bind = , XF86Tools, exec, ags request "xf86tools"
bind = , XF86HomePage, exec, ags request "xf86homepage"
bind = , XF86Mail, exec, ags request "xf86mail"
bind = , XF86Explorer, exec, ags request "xf86explorer"
bind = , XF86Calculator, exec, ags request "xf86calculator"

# SUBMAPS
bind = SUPER, space, exec, $search
bind = SUPER, W, submap, window
bind = SUPER, E, submap, workspace
bind = SUPER, T, submap, layout

## window
submap = window

bind = , R, submap, windowresize
bind = , M, submap, windowmove
bind = , W, submap, windowworkspace
bind = , F, togglefloating

bind = , catchall, submap, reset
submap = reset

## windowresize
submap = windowresize

bind = , H, layoutmsg, colresize -0.1
bind = , J, layoutmsg, colresize +0.1
bind = , K, layoutmsg, colresize -0.1
bind = , L, layoutmsg, colresize +0.1

bind = SHIFT, H, resizeactive, -16 0
bind = SHIFT, J, resizeactive, 0 16
bind = SHIFT, K, resizeactive, 0 -16
bind = SHIFT, L, resizeactive, 16 0

bind = , escape, submap, reset
submap = reset

## windowmove
submap = windowmove

bind = , H, movewindow, l
bind = , J, movewindow, d
bind = , K, movewindow, u
bind = , L, movewindow, r

bind = SHIFT, H, layoutmsg, swapcol l
bind = SHIFT, J, layoutmsg, swapcol d
bind = SHIFT, K, layoutmsg, swapcol u
bind = SHIFT, L, layoutmsg, swapcol r

bind = , P, layoutmsg, promote

bind = , escape, submap, reset
submap = reset

## windowworkspace
submap = windowworkspace

bind = , 0, movetoworkspace, 0
bind = , 0, submap, reset

bind = , 1, movetoworkspace, 1
bind = , 1, submap, reset

bind = , 2, movetoworkspace, 2
bind = , 2, submap, reset

bind = , 3, movetoworkspace, 3
bind = , 3, submap, reset

bind = , 4, movetoworkspace, 4
bind = , 4, submap, reset

bind = , 5, movetoworkspace, 5
bind = , 5, submap, reset

bind = , 6, movetoworkspace, 6
bind = , 6, submap, reset

bind = , 7, movetoworkspace, 7
bind = , 7, submap, reset

bind = , 8, movetoworkspace, 8
bind = , 8, submap, reset

bind = , 9, movetoworkspace, 9
bind = , 9, submap, reset

bindt = , catchall, submap, reset
submap = reset

## workspace
submap = workspace

bind = , M, submap, workspacemonitor

bind = , catchall, submap, reset
submap = reset

## workspacemonitor
submap = workspacemonitor

bind = , 0, exec, ~/scripts/hyprvar marked_workspace 0
bind = , 0, submap, workspacemonitorselect

bind = , 1, exec, ~/scripts/hyprvar marked_workspace 1
bind = , 1, submap, workspacemonitorselect

bind = , 2, exec, ~/scripts/hyprvar marked_workspace 2
bind = , 2, submap, workspacemonitorselect

bind = , 3, exec, ~/scripts/hyprvar marked_workspace 3
bind = , 3, submap, workspacemonitorselect

bind = , 4, exec, ~/scripts/hyprvar marked_workspace 4
bind = , 4, submap, workspacemonitorselect

bind = , 5, exec, ~/scripts/hyprvar marked_workspace 5
bind = , 5, submap, workspacemonitorselect

bind = , 6, exec, ~/scripts/hyprvar marked_workspace 6
bind = , 6, submap, workspacemonitorselect

bind = , 7, exec, ~/scripts/hyprvar marked_workspace 7
bind = , 7, submap, workspacemonitorselect

bind = , 8, exec, ~/scripts/hyprvar marked_workspace 8
bind = , 8, submap, workspacemonitorselect

bind = , 9, exec, ~/scripts/hyprvar marked_workspace 9
bind = , 9, submap, workspacemonitorselect

bind = , catchall, submap, reset
submap = reset

## workspacemonitorselect
submap = workspacemonitorselect

bind = , L, exec, ~/scripts/moveworkspace NOTHING-L
bind = , L, submap, workspacemonitor

bind = , C, exec, ~/scripts/moveworkspace HDMI-A-1
bind = , C, submap, workspacemonitor

bind = , R, exec, ~/scripts/moveworkspace NOTHING-R
bind = , R, submap, workspacemonitor

bind = , catchall, submap, reset
submap = reset

## layout (todo)
submap = layout
bind = , catchall, submap, reset
submap = reset
