exec-once = hyprctl output create headless NOTHING-L; wayvnc -f 60 -o NOTHING-L -d -R 0.0.0.0 5901 -p --gpu -S /tmp/wayvnc-l.sock
exec-once = hyprctl output create headless NOTHING-R; wayvnc -f 60 -o NOTHING-R -d -R 0.0.0.0 5900 -p --gpu -S /tmp/wayvnc-r.sock

exec-once = swww-daemon --no-cache
exec-once = hyprsunset
exec-once = ollama serve
exec-once = fcitx5 -d -r
exec-once = fcitx5-remote -r
exec-once = $lute
exec-once = wl-paste --watch cliphist store

exec-once = python /home/n3rdium/scripts/startup.py

exec = swww clear 1d2021
exec = ags quit || true && ags run
exec-once = systemctl --user start hyprpolkitagent
