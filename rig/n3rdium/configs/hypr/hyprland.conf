monitor=HDMI-A-1,1920x1080@60, 0x0,1,vrr,1
monitor=NOTHING-R,1600x900@60,1920x0,1,vrr,1
monitor=NOTHING-L,1366x768@60,-1366x0,1,vrr,1

env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME, qt5ct
env = NIXOS_OZONE_WL, 1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = MOZ_ENABLE_WAYLAND,1

env = XMODIFIERS, @im=fcitx
env = GTK_IM_MODULE, fcitx
env = QT_IM_MODULE, fcitx
env = SDL_IM_MODULE, fcitx
env = GLFW_IM_MODULE, ibus

env = OLLAMA_VULKAN, 1

env = HYPRCURSOR_THEME, phinger-cursors-dark-hyprcursor
env = HYPRCURSOR_SIZE,24

general {
    gaps_in     = 7
    gaps_out    = 18
    border_size = 1

    col.inactive_border = rgb(7c6f64)
    col.active_border   = rgb(ebdbb2)

    layout        = scrolling
    allow_tearing = true
}

scrolling {
    column_width = 0.7
    focus_fit_method = 0
}

# smart gaps: https://wiki.hypr.land/Configuring/Workspace-Rules/#smart-gaps
workspace = w[tv1]s[false], gapsout:0, gapsin:0
workspace = f[1]s[false], gapsout:0, gapsin:0
windowrule = match:float false, match:workspace w[tv1]s[false], border_size 0
windowrule = match:float false, match:workspace w[tv1]s[false], rounding 0
windowrule = match:float false, match:workspace f[1]s[false], border_size 0
windowrule = match:float false, match:workspace f[1]s[false], rounding 0

input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0
    # TODO swap capslk and esc
}

misc {
    force_default_wallpaper      = 0
    vfr                          = true
    vrr                          = 1
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    disable_splash_rendering     = true
}

cursor {
    no_hardware_cursors = true
	no_break_fs_vrr     = true
	inactive_timeout    = 4
	no_warps            = true
	min_refresh_rate    = 64
}

xwayland {
  force_zero_scaling = true
}

